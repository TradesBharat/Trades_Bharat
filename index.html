/* =====================================================================
   MARKETVISION — SINGLE FILE REACT APPLICATION
   Design language: White / Silver / Graphite — a "brushed steel"
   professional finance aesthetic. Every color below is derived from a
   neutral silver ramp with one graphite-blue accent used sparingly.
   =====================================================================
   TABLE OF CONTENTS
   1.  Design tokens (color / type / spacing / shadow / radius)
   2.  Global reset & base typography
   3.  Utility classes
   4.  Motion / keyframe library
   5.  Scroll progress bar + cursor glow
   6.  Navigation
   7.  Hero
   8.  Marquee logos strip
   9.  Stats counter strip
   10. About
   11. Services (grid + detail rows)
   13. How it works
   14. Why choose us
   15. Cloud platform panel
   16. Testimonials carousel
   17. Mission / Vision
   18. Team
   19. Learning Center (filterable articles)
   20. FAQ accordion
   21. Newsletter
   22. Pricing
   23. Contact
   24. Footer
   25. Responsive breakpoints
   ===================================================================== */

/* ---------------------------------------------------------------------
   1. DESIGN TOKENS
   --------------------------------------------------------------------- */
:root{
  /* Neutral silver ramp */
  --white:        #FFFFFF;
  --silver-25:    #FCFCFD;
  --silver-50:    #F8F9FB;
  --silver-100:   #F0F2F5;
  --silver-150:   #E9EBEF;
  --silver-200:   #E2E5EA;
  --silver-300:   #CFD4DC;
  --silver-400:   #AEB6C2;
  --silver-500:   #8A94A6;
  --silver-600:   #667085;
  --silver-700:   #475467;
  --silver-800:   #2C3444;
  --silver-900:   #171B24;

  /* Ink / text */
  --ink-900:      #10131A;
  --ink-800:      #1D2230;
  --ink-600:      #4B5468;
  --ink-400:      #838DA0;

  /* Primary accent — deep navy blue, sampled from the Trades Bharat logo */
  --accent-900:   #0A2148;
  --accent-800:   #0F2E5E;
  --accent-700:   #123A6E;
  --accent-500:   #1E56A8;
  --accent-300:   #7FA8DE;
  --accent-100:   #E2ECFB;

  /* Secondary accents — used sparingly for variety across cards, tags & icons */
  --teal-700:     #0D7A70;
  --teal-500:     #17B3A3;
  --teal-100:     #DAF6F1;

  --violet-700:   #6427C4;
  --violet-500:   #8B5CF6;
  --violet-100:   #EEE7FD;

  --coral-700:    #C2410C;
  --coral-500:    #F2711F;
  --coral-100:    #FDEADA;

  --rose-700:     #B0356B;
  --rose-500:     #E85D9A;
  --rose-100:     #FBE3EF;

  /* Brand orange — sampled from the logo's "BHARAT" wordmark & candle highlight */
  --orange-700:   #C25A0A;
  --orange-500:   #EE7A16;
  --orange-100:   #FEEBD9;

  /* Semantic */
  --up:           #1F9D57;
  --down:         #D14A3D;
  --gold:         #E8720A;

  /* Surfaces */
  --surface-0:    var(--white);
  --surface-1:    var(--silver-25);
  --surface-2:    var(--silver-50);
  --surface-3:    var(--silver-100);
  --line:         var(--silver-200);
  --line-soft:    var(--silver-150);

  /* Shadows — soft, layered, "brushed steel" */
  --shadow-xs:    0 1px 2px rgba(16,19,26,0.04);
  --shadow-sm:    0 2px 8px rgba(16,19,26,0.06);
  --shadow-md:    0 8px 24px rgba(16,19,26,0.08);
  --shadow-lg:    0 20px 48px rgba(16,19,26,0.10);
  --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.6);
  --shadow-accent: 0 10px 28px rgba(26,79,160,0.18);

  /* Radius */
  --r-xs: 4px;
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 22px;
  --r-full: 999px;

  /* Type scale */
  --fs-display: clamp(40px, 5.6vw, 76px);
  --fs-h1: clamp(32px, 4vw, 52px);
  --fs-h2: clamp(26px, 3.2vw, 40px);
  --fs-h3: clamp(20px, 2.2vw, 26px);
  --fs-body: 16px;
  --fs-sm: 14px;
  --fs-xs: 12.5px;

  /* Motion */
  --ease-out: cubic-bezier(.16,1,.3,1);
  --ease-soft: cubic-bezier(.22,.61,.36,1);
  --dur-fast: 220ms;
  --dur-med: 420ms;
  --dur-slow: 700ms;
}

/* ---------------------------------------------------------------------
   2. GLOBAL RESET & BASE TYPOGRAPHY
   --------------------------------------------------------------------- */
*, *::before, *::after{ box-sizing: border-box; }
html{ scroll-behavior: smooth; }
body{
  margin:0;
  background: var(--surface-0);
  color: var(--ink-800);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: var(--fs-body);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}
h1,h2,h3,h4{
  font-family: 'Fraunces', serif;
  font-weight: 600;
  letter-spacing: -0.015em;
  color: var(--ink-900);
  margin: 0;
}
p{ margin: 0; }
a{ color: inherit; text-decoration: none; }
ul,ol{ list-style:none; margin:0; padding:0; }
img,svg{ display:block; max-width:100%; }
button{ font-family: inherit; cursor: pointer; }
input, textarea, select{ font-family: inherit; font-size: inherit; }
::selection{ background: var(--accent-700); color: var(--white); }
:focus-visible{ outline: 2px solid var(--accent-500); outline-offset: 3px; border-radius: 2px; }

.mono{ font-family: 'IBM Plex Mono', monospace; }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
}

/* ---------------------------------------------------------------------
   3. UTILITY CLASSES
   --------------------------------------------------------------------- */
.wrap{ max-width: 1200px; margin: 0 auto; padding: 0 32px; }
.section{ padding: 112px 0; position: relative; }
.section-tight{ padding: 80px 0; }
.section-border-b{ border-bottom: 1px solid var(--line); }
.center{ text-align: center; }
.kicker{
  display:inline-flex; align-items:center; gap:8px;
  font-family:'IBM Plex Mono', monospace;
  font-size: 11.5px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--accent-700);
  margin-bottom: 16px;
}
.kicker::before{
  content:""; width:16px; height:1px; background: var(--accent-500);
}
.section-head{
  display:grid; grid-template-columns: 1.1fr 0.9fr; gap: 48px;
  align-items: end; margin-bottom: 64px;
}
.section-head.center-head{ grid-template-columns: 1fr; justify-items:center; text-align:center; }
.section-head h2{ font-size: var(--fs-h2); line-height:1.15; }
.section-head p{ color: var(--ink-600); font-size: 15.5px; max-width: 440px; }
.eyebrow-dot{
  width:7px; height:7px; border-radius:50%; background: var(--up);
  box-shadow: 0 0 0 4px rgba(47,134,89,0.14);
  display:inline-block;
}
.pill{
  display:inline-flex; align-items:center; gap:8px;
  padding: 8px 16px; border-radius: var(--r-full);
  background: var(--surface-2); border:1px solid var(--line);
  font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.06em; color:var(--ink-600);
}

/* Buttons */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding: 14px 26px; font-size: 14px; font-weight:600; letter-spacing:0.01em;
  border-radius: var(--r-sm); border: 1px solid var(--silver-300);
  background: var(--white); color: var(--ink-800);
  transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), border-color var(--dur-fast), background var(--dur-fast);
  position: relative; overflow:hidden; isolation:isolate;
}
.btn:hover{ transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--silver-400); }
.btn:active{ transform: translateY(0); }
.btn.primary{
  background: linear-gradient(180deg, var(--accent-700), var(--accent-900));
  color: var(--white); border-color: var(--accent-900);
  box-shadow: var(--shadow-sm);
}
.btn.primary:hover{ box-shadow: var(--shadow-lg); }
.btn.primary::after{
  content:""; position:absolute; inset:0; z-index:-1;
  background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.22) 40%, transparent 60%);
  transform: translateX(-120%);
  transition: transform var(--dur-slow) var(--ease-soft);
}
.btn.primary:hover::after{ transform: translateX(120%); }
.btn.ghost{ background: transparent; border-color: transparent; color: var(--ink-600); padding: 14px 10px; }
.btn.ghost:hover{ color: var(--ink-900); transform:none; box-shadow:none; }
.btn.block{ width:100%; }
.btn.sm{ padding: 10px 18px; font-size: 13px; }

/* Cards / panels — brushed-steel surface */
.panel{
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-sm);
}
.panel-inset{
  background: linear-gradient(180deg, var(--surface-2), var(--white));
}

/* ---------------------------------------------------------------------
   4. MOTION / KEYFRAME LIBRARY
   --------------------------------------------------------------------- */
@keyframes marquee{ from{ transform: translateX(0); } to{ transform: translateX(-50%); } }
@keyframes fadeUp{ from{ opacity:0; transform: translateY(24px);} to{ opacity:1; transform:translateY(0);} }
@keyframes fadeIn{ from{ opacity:0;} to{ opacity:1;} }
@keyframes shimmer{
  0%{ background-position: -300px 0; }
  100%{ background-position: 300px 0; }
}
@keyframes floatSlow{
  0%,100%{ transform: translateY(0) translateX(0); }
  50%{ transform: translateY(-14px) translateX(6px); }
}
@keyframes pulseDot{
  0%{ box-shadow: 0 0 0 0 rgba(47,134,89,0.35); }
  70%{ box-shadow: 0 0 0 9px rgba(47,134,89,0); }
  100%{ box-shadow: 0 0 0 0 rgba(47,134,89,0); }
}
@keyframes rotateSlow{ from{ transform: rotate(0deg);} to{ transform: rotate(360deg);} }
@keyframes drawLine{ from{ stroke-dashoffset: 900; } to{ stroke-dashoffset: 0; } }

.reveal{
  opacity: 0; transform: translateY(28px);
  transition: opacity var(--dur-slow) var(--ease-out), transform var(--dur-slow) var(--ease-out);
}
.reveal.in{ opacity:1; transform: translateY(0); }
.reveal.d1{ transition-delay: 80ms; }
.reveal.d2{ transition-delay: 160ms; }
.reveal.d3{ transition-delay: 240ms; }
.reveal.d4{ transition-delay: 320ms; }
.reveal.d5{ transition-delay: 400ms; }
.reveal.d6{ transition-delay: 480ms; }

.float{ animation: floatSlow 7s ease-in-out infinite; }
.pulse-dot{ animation: pulseDot 2.2s infinite; }

/* ---------------------------------------------------------------------
   5. SCROLL PROGRESS BAR + CURSOR GLOW
   --------------------------------------------------------------------- */
.scroll-progress{
  position: fixed; top:0; left:0; height:3px; z-index:200;
  background: linear-gradient(90deg, var(--accent-500), var(--accent-900));
  transition: width 80ms linear;
}
.cursor-glow{
  position: fixed; width: 420px; height: 420px; border-radius: 50%;
  pointer-events: none; z-index: 0;
  background: radial-gradient(circle, rgba(71,97,125,0.06), transparent 70%);
  transform: translate(-50%,-50%);
  transition: left 180ms ease-out, top 180ms ease-out;
  display: none;
}
@media (min-width: 960px){ .cursor-glow{ display:block; } }

/* ---------------------------------------------------------------------
   7. NAVIGATION
   --------------------------------------------------------------------- */
header.site{
  position: sticky; top:0; z-index: 100;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(14px) saturate(1.4);
  border-bottom: 1px solid var(--line);
  transition: box-shadow var(--dur-fast) ease, background var(--dur-fast) ease;
}
header.site.scrolled{ box-shadow: var(--shadow-sm); background: rgba(255,255,255,0.94); }
nav.navbar{
  display:flex; align-items:center; justify-content:space-between; height: 76px; position:relative;
}
.brand{ display:flex; align-items:center; gap:10px; font-family:'Fraunces',serif; font-size:20px; font-weight:600; color: var(--ink-900); }
.brand .mark{
  width:auto; height:38px; display:block; object-fit:contain;
}
.nav-links{ display:flex; gap: 8px; align-items:center; }
.nav-links a{
  font-size:14px; color: var(--ink-600); font-weight:500; padding: 10px 16px; border-radius: var(--r-sm);
  transition: color var(--dur-fast), background var(--dur-fast);
  position:relative;
}
.nav-links a:hover{ color: var(--ink-900); background: var(--surface-2); }
.nav-links a.active{ color: var(--accent-800, var(--accent-700)); }
.nav-links a.active::after{
  content:""; position:absolute; left:16px; right:16px; bottom:4px; height:2px; background: var(--accent-700); border-radius:2px;
}
.nav-cta{ display:flex; align-items:center; gap:10px; }
.menu-toggle{
  display:none; flex-direction:column; gap:5px; background:none; border:none; padding:8px;
}
.menu-toggle span{ width:22px; height:2px; background: var(--ink-800); border-radius:2px; transition: transform var(--dur-fast), opacity var(--dur-fast); }
.menu-toggle.open span:nth-child(1){ transform: translateY(7px) rotate(45deg); }
.menu-toggle.open span:nth-child(2){ opacity:0; }
.menu-toggle.open span:nth-child(3){ transform: translateY(-7px) rotate(-45deg); }

.mobile-backdrop{
  display:none;
  position: fixed; inset:0; z-index:150;
  background: rgba(10,13,20,0.55); backdrop-filter: blur(2px);
  opacity:0; pointer-events:none;
  transition: opacity var(--dur-med) ease;
}
.mobile-backdrop.open{ opacity:1; pointer-events:auto; }

.mobile-panel{
  display:none;
  position: fixed; top:0; right:0; bottom:0; z-index:151;
  width: min(340px, 86vw);
  background: var(--white);
  box-shadow: -18px 0 48px rgba(10,13,26,0.22);
  transform: translateX(100%);
  transition: transform var(--dur-med) var(--ease-out);
  overflow-y:auto;
  display:flex; flex-direction:column;
}
.mobile-panel.open{ transform: translateX(0); }
.mobile-panel-head{
  display:flex; align-items:center; justify-content:space-between;
  padding: 22px 24px; border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.mobile-panel-head .brand{ font-size:17px; }
.mobile-panel-head .brand .mark{ height:32px; }
.mobile-panel-close{
  width:36px; height:36px; border-radius:50%; border:1px solid var(--line);
  background: var(--surface-2); display:flex; align-items:center; justify-content:center;
  font-size:16px; color: var(--ink-600); transition: all var(--dur-fast) ease; flex-shrink:0;
}
.mobile-panel-close:hover{ background: var(--silver-150); color: var(--ink-900); }
.mobile-panel-links{ padding: 10px 14px; flex:1; }
.mobile-panel a.mobile-link{
  display:flex; align-items:center; gap:14px;
  padding:15px 14px; border-radius: var(--r-sm); margin-bottom:2px;
  font-size:15.5px; color: var(--ink-800); font-weight:500;
  transition: background var(--dur-fast) ease, color var(--dur-fast) ease;
}
.mobile-panel a.mobile-link:active{ background: var(--surface-2); }
.mobile-panel a.mobile-link.active{
  background: var(--accent-100); color: var(--accent-800, var(--accent-700)); font-weight:600;
}
.mobile-link-icon{
  width:34px; height:34px; border-radius: var(--r-sm); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:15px;
  background: var(--surface-2); color: var(--ink-600);
  transition: background var(--dur-fast) ease, color var(--dur-fast) ease;
}
.mobile-panel a.mobile-link.active .mobile-link-icon{
  background: var(--accent-700); color: var(--white);
}
.mobile-link-arrow{ margin-left:auto; color: var(--silver-400); font-size:13px; }
.mobile-panel-foot{
  padding: 20px 24px 28px; border-top:1px solid var(--line); flex-shrink:0;
  background: var(--surface-1);
}
.mobile-panel .mobile-cta{ display:flex; flex-direction:column; gap:10px; }
.mobile-panel-note{
  margin-top:16px; text-align:center; font-size:11.5px; color: var(--ink-400);
  font-family:'IBM Plex Mono',monospace; letter-spacing:0.04em;
}

/* ---------------------------------------------------------------------
   8. HERO
   --------------------------------------------------------------------- */
.hero{
  position:relative; padding: 36px 0 32px; overflow:hidden;
  background: var(--white);
}
.hero-image-band{
  position:absolute; inset:0; overflow:hidden; z-index:0; pointer-events:none;
}
.hero-image-band svg{
  width:100%; height:100%; display:block;
}
.hero-image-scrim{
  position:absolute; inset:0; z-index:0; pointer-events:none;
  background:
    linear-gradient(100deg,
      rgba(255,255,255,0.94) 0%,
      rgba(255,255,255,0.84) 16%,
      rgba(255,255,255,0.52) 28%,
      rgba(255,255,255,0.22) 38%,
      rgba(255,255,255,0.06) 48%,
      transparent 58%
    ),
    linear-gradient(0deg,
      rgba(255,255,255,0.62) 0%,
      rgba(255,255,255,0.38) 22%,
      rgba(255,255,255,0.12) 40%,
      transparent 54%
    );
}
.hero-grid-lines{
  position:absolute; inset:0; opacity:0.5;
  background-image: linear-gradient(var(--line-soft) 1px, transparent 1px), linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size: 68px 68px;
  mask-image: radial-gradient(ellipse 68% 55% at 62% 26%, black, transparent 78%);
}
.hero-orb{
  position:absolute; width: 360px; height:360px; border-radius:50%;
  filter: blur(4px);
}
.hero-orb.a{ top:-60px; right: 6%; background: radial-gradient(circle at 32% 32%, rgba(30,86,168,0.20), transparent 68%); }
.hero-orb.b{ bottom:-100px; left: -4%; width:280px; height:280px; background: radial-gradient(circle at 32% 32%, rgba(238,122,22,0.18), transparent 68%); }
.hero-content{
  display:grid; grid-template-columns: 1.08fr 0.92fr; gap: 44px; align-items:center; position:relative; z-index:1;
}
.hero h1{ font-size: clamp(28px, 3.4vw, 42px); line-height:1.08; margin-bottom: 12px; text-shadow: 0 1px 20px rgba(255,255,255,0.85); }
.hero h1 .accent-word{
  background: linear-gradient(100deg, var(--accent-900), var(--accent-500) 55%, var(--orange-500));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  background-size: 200% 100%; animation: accentShift 6s ease-in-out infinite;
}
@keyframes accentShift{ 0%,100%{ background-position: 0% 0; } 50%{ background-position: 100% 0; } }
.hero p.lead{ font-size: 14.5px; color: var(--ink-800); font-weight:500; max-width: 460px; margin-bottom: 16px; text-shadow: 0 1px 18px rgba(255,255,255,0.9), 0 0px 6px rgba(255,255,255,0.85); }
.hero-actions{ display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-bottom: 14px; }

/* Trust row — social proof directly in the hero */
.hero-trust-row{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom: 6px; }
.trust-avatars{ display:flex; align-items:center; }
.trust-avatar-chip{
  width:30px; height:30px; border-radius:50%; border:2px solid var(--white);
  display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:600; color:var(--white);
  margin-left:-9px; box-shadow: var(--shadow-sm);
}
.trust-avatar-chip:first-child{ margin-left:0; }
.trust-avatar-chip.more{ background: var(--ink-900); font-size:9px; }
.trust-rating{ font-family:'IBM Plex Mono',monospace; font-size:12px; color: var(--gold); letter-spacing:0.02em; }
.trust-rating span{ color: var(--ink-800); font-weight:600; margin-left:4px; }
.trust-label-line{ font-size:12px; color: var(--ink-700); margin-bottom: 12px; font-weight:600; text-shadow: 0 1px 16px rgba(255,255,255,0.9), 0 0px 6px rgba(255,255,255,0.9); }
.hero-badges-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 18px; }
.hero-badges-row .pill{ padding:6px 12px; font-size:10.5px; }

.hero-stats{ display:flex; gap:26px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.5); flex-wrap:wrap; }
.hstat .num{ font-family:'IBM Plex Mono',monospace; font-size:19px; color: var(--ink-900); font-weight:700; text-shadow: 0 1px 14px rgba(255,255,255,0.9), 0 0px 5px rgba(255,255,255,0.9); }
.hstat .label{ font-size:10.5px; color: var(--ink-700); margin-top:2px; font-weight:500; text-shadow: 0 1px 14px rgba(255,255,255,0.9), 0 0px 5px rgba(255,255,255,0.9); }

/* Hero market snapshot card */
.chart-card{
  border-radius: var(--r-lg); border:1px solid var(--line); background: var(--white);
  box-shadow: var(--shadow-lg); padding: 20px 20px 6px; position:relative;
  transform: perspective(1200px) rotateY(-4deg) rotateX(2deg);
  transition: transform var(--dur-med) var(--ease-out);
  max-width: 420px; margin-left:auto;
}
.chart-card:hover{ transform: perspective(1200px) rotateY(0deg) rotateX(0deg); }
.chart-card-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 6px; padding-bottom:14px; border-bottom:1px solid var(--line-soft); }
.chart-card-head .sym{ font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink-900); font-weight:600; letter-spacing:0.02em; }
.chart-card-head .sub{ font-size:10.5px; color: var(--ink-400); margin-top:3px; }
.snapshot-live{
  display:inline-flex; align-items:center; gap:7px; font-size:10px; letter-spacing:0.06em; color: var(--accent-700);
  background: var(--accent-100); padding:5px 10px; border-radius: var(--r-full); font-weight:600;
}
.feature-rows{ display:flex; flex-direction:column; }
.feature-row{
  display:flex; align-items:flex-start; gap:12px;
  padding: 12px 0; border-bottom:1px solid var(--line-soft);
}
.feature-row:last-child{ border-bottom:none; }
.feature-row-icon{
  width:30px; height:30px; flex-shrink:0; border-radius: var(--r-sm);
  background: var(--accent-100); color: var(--accent-700);
  display:flex; align-items:center; justify-content:center; font-size:14px; margin-top:1px;
}
.feature-row-title{ font-size:12.5px; font-weight:600; color: var(--ink-800); margin-bottom:2px; }
.feature-row-copy{ font-size:11.5px; color: var(--ink-400); line-height:1.4; }
.chart-card-foot{
  display:flex; justify-content:space-between; padding: 12px 0 14px; border-top:1px solid var(--line-soft); margin-top:6px;
  font-family:'IBM Plex Mono',monospace; font-size:10px; color: var(--ink-400);
}

/* ---------------------------------------------------------------------
   9. MARQUEE LOGOS
   --------------------------------------------------------------------- */
.logos-strip{ padding: 40px 0; border-bottom:1px solid var(--line); overflow:hidden; }
.logos-label{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-400); text-align:center; margin-bottom:24px; }
.logos-track{ display:flex; gap:64px; align-items:center; animation: marquee 26s linear infinite; width:max-content; }
.logo-item{ font-family:'Fraunces',serif; font-size:20px; color: var(--silver-500); letter-spacing:0.02em; white-space:nowrap; }

/* ---------------------------------------------------------------------
   10. STATS COUNTER STRIP
   --------------------------------------------------------------------- */
.stats-strip{ display:grid; grid-template-columns: repeat(4,1fr); border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; background: var(--white); box-shadow: var(--shadow-sm); }
.stat-cell{ padding: 36px 30px; border-right:1px solid var(--line); position:relative; }
.stat-cell:last-child{ border-right:none; }
.stat-cell .num{ font-family:'IBM Plex Mono',monospace; font-size:32px; color: var(--ink-900); font-weight:600; }
.stat-cell .label{ font-size:13px; color:var(--ink-400); margin-top:8px; }
.stat-cell .spark{ position:absolute; top:24px; right:26px; opacity:0.5; }

/* ---------------------------------------------------------------------
   11. ABOUT
   --------------------------------------------------------------------- */
.about-grid{ display:grid; grid-template-columns: 0.82fr 1.18fr; gap: 72px; }
.about-photo-banner{ border-radius: var(--r-lg); overflow:hidden; border:1px solid var(--line); box-shadow: var(--shadow-md); }
.about-photo-banner img{ width:100%; height:340px; object-fit:cover; display:block; }
.about-grid h2{ font-size: var(--fs-h2); line-height:1.2; }
.about-copy p{ color: var(--ink-600); font-size:15.5px; margin-bottom:20px; }
.pillar-list{ margin-top:30px; }
.pillar{ display:flex; gap:18px; padding:20px 0; border-top:1px solid var(--line); transition: padding-left var(--dur-fast) ease; }
.pillar:hover{ padding-left:6px; }
.pillar:last-child{ border-bottom:1px solid var(--line); }
.pillar .idx{ font-family:'IBM Plex Mono',monospace; color: var(--accent-700); font-size:13px; padding-top:2px; }
.pillar .t{ font-size:15.5px; color:var(--ink-900); font-weight:600; margin-bottom:4px; }
.pillar .d{ font-size:13.5px; color: var(--ink-400); }

.timeline{ border-left:2px solid var(--line); margin-left:8px; }
.tl-item{ position:relative; padding: 0 0 44px 34px; }
.tl-item:last-child{ padding-bottom:0; }
.tl-item::before{
  content:""; position:absolute; left:-7px; top:4px; width:11px; height:11px; border-radius:50%;
  background: var(--white); border:2px solid var(--accent-700); box-shadow: 0 0 0 4px var(--white);
}
.tl-item .yr{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; color: var(--accent-700); margin-bottom:6px; font-weight:600; }
.tl-item h4{ font-size:17px; color: var(--ink-900); margin-bottom:6px; font-family:'Inter',sans-serif; font-weight:600; }
.tl-item p{ font-size:14px; color: var(--ink-600); max-width:520px; }

.values-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:18px; }
.value-card{
  background: var(--white); border:1px solid var(--line); border-radius: var(--r-md); padding: 30px 26px;
  transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), border-color var(--dur-fast);
}
.value-card:hover{ transform: translateY(-6px); box-shadow: var(--shadow-md); border-color: var(--silver-300); }
.value-card .num{ font-family:'IBM Plex Mono',monospace; color: var(--silver-400); font-size:12px; margin-bottom:18px; }
.value-card h4{ font-size:16px; color: var(--ink-900); margin-bottom:8px; font-family:'Inter',sans-serif; font-weight:600; }
.value-card p{ font-size:13.5px; color: var(--ink-600); }

.team-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:26px; }
.team-card{ border:1px solid var(--line); border-radius: var(--r-md); padding:24px; background: var(--white); transition: box-shadow var(--dur-fast), transform var(--dur-fast); }
.team-card:hover{ box-shadow: var(--shadow-md); transform: translateY(-4px); }
.avatar{
  width:100%; aspect-ratio:1; border-radius: var(--r-sm); margin-bottom:18px;
  background: linear-gradient(150deg, var(--silver-100), var(--silver-200));
  border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  font-family:'Fraunces',serif; font-size:30px; color: var(--accent-700);
}
.team-card h4{ font-size:15.5px; color: var(--ink-900); margin-bottom:3px; font-family:'Inter',sans-serif; font-weight:600; }
.team-card .role{ font-size:12.5px; color: var(--accent-700); font-family:'IBM Plex Mono',monospace; margin-bottom:12px; }
.team-card p{ font-size:13px; color: var(--ink-400); }

/* ---------------------------------------------------------------------
   12. SERVICES
   --------------------------------------------------------------------- */
.services-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:1px; background: var(--line); border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; }
.service-card{ background: var(--white); padding: 36px 32px; transition: background var(--dur-fast) ease; position:relative; }
.service-card:hover{ background: var(--surface-2); }
.service-card .tag{ font-family:'IBM Plex Mono',monospace; font-size:11px; color: var(--ink-400); margin-bottom:22px; display:block; }
.service-card h3{ font-size:19px; color: var(--ink-900); margin-bottom:10px; font-weight:600; font-family:'Inter',sans-serif; }
.service-card p{ font-size:14px; color: var(--ink-600); }
.service-card .icon{
  width:38px; height:38px; border-radius: var(--r-sm); display:flex; align-items:center; justify-content:center; margin-bottom:24px;
  background: linear-gradient(150deg, var(--silver-100), var(--white)); border:1px solid var(--line); color: var(--accent-700);
  transition: transform var(--dur-fast) var(--ease-out);
}
.service-card:nth-child(1) .icon{ background: linear-gradient(150deg, var(--accent-100), var(--white)); color: var(--accent-700); }
.service-card:nth-child(2) .icon{ background: linear-gradient(150deg, var(--teal-100), var(--white)); color: var(--teal-700); }
.service-card:nth-child(3) .icon{ background: linear-gradient(150deg, var(--violet-100), var(--white)); color: var(--violet-700); }
.service-card:nth-child(4) .icon{ background: linear-gradient(150deg, var(--coral-100), var(--white)); color: var(--coral-700); }
.service-card:nth-child(5) .icon{ background: linear-gradient(150deg, var(--rose-100), var(--white)); color: var(--rose-700); }
.service-card:nth-child(6) .icon{ background: linear-gradient(150deg, var(--accent-100), var(--white)); color: var(--accent-700); }
.service-card:nth-child(7) .icon{ background: linear-gradient(150deg, var(--teal-100), var(--white)); color: var(--teal-700); }
.service-card:nth-child(8) .icon{ background: linear-gradient(150deg, var(--violet-100), var(--white)); color: var(--violet-700); }
.service-card:nth-child(9) .icon{ background: linear-gradient(150deg, var(--coral-100), var(--white)); color: var(--coral-700); }
.service-card:nth-child(10) .icon{ background: linear-gradient(150deg, var(--rose-100), var(--white)); color: var(--rose-700); }
.service-card:hover .icon{ transform: rotate(-8deg) scale(1.06); }
.service-card a.more{ display:inline-flex; align-items:center; gap:6px; margin-top:18px; font-size:13px; color: var(--accent-800, var(--accent-700)); font-weight:600; }
.service-card a.more .arrow{ transition: transform var(--dur-fast) var(--ease-out); }
.service-card a.more:hover .arrow{ transform: translateX(4px); }

.service-detail{ display:grid; grid-template-columns: 0.92fr 1.08fr; gap:60px; align-items:center; padding: 72px 0; border-bottom:1px solid var(--line); }
.service-detail:last-child{ border-bottom:none; }
.service-detail.reverse{ grid-template-columns: 1.08fr 0.92fr; }
.service-detail.reverse .sd-visual{ order:2; }
.service-detail.reverse .sd-copy{ order:1; }
.sd-copy h3{ font-size: var(--fs-h3); color: var(--ink-900); margin-bottom:16px; }
.sd-copy p{ font-size:15px; color: var(--ink-600); margin-bottom:24px; }
.sd-features{ display:flex; flex-direction:column; gap:13px; }
.sd-feature{ display:flex; gap:12px; align-items:flex-start; font-size:14px; color: var(--ink-800); }
.sd-feature .chk{
  width:18px; height:18px; border-radius:50%; background: var(--accent-100); color: var(--accent-800, var(--accent-700));
  display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; margin-top:2px;
}
.sd-visual{ border-radius: var(--r-lg); border:1px solid var(--line); background: var(--white); box-shadow: var(--shadow-md); padding:28px; }
.mini-row{ display:flex; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--line-soft); font-size:13.5px; }
.mini-row:last-child{ border-bottom:none; }
.mini-row .k{ color: var(--ink-400); }
.mini-row .v{ font-family:'IBM Plex Mono',monospace; color: var(--ink-900); font-weight:600; }
.mini-row .v.up{ color: var(--up); }
.mini-row .v.down{ color: var(--down); }

/* ---------------------------------------------------------------------
   13. HOW IT WORKS
   --------------------------------------------------------------------- */
.steps-grid{ display:grid; grid-template-columns: repeat(4,1fr); border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; background: var(--line); gap:1px; }
.step-cell{ background: var(--white); padding: 32px 28px; position:relative; transition: background var(--dur-fast); }
.step-cell:hover{ background: var(--surface-2); }
.step-cell .n{ font-family:'Fraunces',serif; font-size:36px; color: var(--accent-300); margin-bottom:16px; }
.step-cell h4{ font-size:15.5px; color: var(--ink-900); margin-bottom:8px; font-family:'Inter',sans-serif; font-weight:600; }
.step-cell p{ font-size:13px; color: var(--ink-400); }

/* ---------------------------------------------------------------------
   14. WHY CHOOSE US
   --------------------------------------------------------------------- */
.why-wrap{ display:grid; grid-template-columns: 0.68fr 1.32fr; gap: 64px; }
.why-list{ display:grid; grid-template-columns: 1fr 1fr; border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; }
.why-item{
  padding: 24px 26px; border-right:1px solid var(--line); border-bottom:1px solid var(--line);
  font-size:14.5px; color: var(--ink-800); display:flex; align-items:flex-start; gap:12px;
  transition: background var(--dur-fast);
}
.why-item:hover{ background: var(--surface-2); }
.why-item .ico{ color: var(--accent-700); font-family:'IBM Plex Mono',monospace; }

/* ---------------------------------------------------------------------
   15. CLOUD PLATFORM
   --------------------------------------------------------------------- */
.cloud-section{
  background:
    linear-gradient(180deg, rgba(15,19,26,0.90), rgba(15,44,92,0.90) 130%),
    url('https://png.pngtree.com/background/20250714/original/pngtree-close-up-of-a-stock-market-trading-screen-with-candlestick-charts-picture-image_16725462.jpg');
  background-size: cover; background-position: center;
  border-radius: var(--r-lg); overflow:hidden; position:relative;
}
.cloud-section::before{
  content:""; position:absolute; inset:0; opacity:0.5;
  background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 56px 56px;
}
.cloud-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:60px; align-items:center; position:relative; padding: 72px; }
.cloud-copy .kicker{ color: var(--silver-300); }
.cloud-copy .kicker::before{ background: var(--silver-300); }
.cloud-copy h2{ font-size: var(--fs-h2); color: var(--white); margin-bottom:18px; }
.cloud-copy p{ color: var(--silver-400); font-size:15.5px; margin-bottom:24px; }
.cloud-tags{ display:flex; flex-wrap:wrap; gap:10px; }
.cloud-tag{ font-family:'IBM Plex Mono',monospace; font-size:11px; color: var(--silver-200); border:1px solid rgba(255,255,255,0.16); padding:8px 14px; border-radius: var(--r-full); }
.uptime-panel{ background: rgba(255,255,255,0.06); backdrop-filter: blur(8px); border:1px solid rgba(255,255,255,0.14); border-radius: var(--r-md); padding: 28px; }
.uptime-row{ display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.1); font-size:13.5px; }
.uptime-row:last-child{ border-bottom:none; }
.uptime-row .label{ color: var(--silver-400); }
.uptime-row .val{ font-family:'IBM Plex Mono',monospace; color:#7FDCA6; font-weight:600; }

/* ---------------------------------------------------------------------
   16. TESTIMONIALS
   --------------------------------------------------------------------- */
.testi-wrap{ position:relative; max-width:760px; margin:0 auto; }
.testi-card{
  background: var(--white); border:1px solid var(--line); border-radius: var(--r-lg); padding:48px; text-align:center;
  box-shadow: var(--shadow-md);
}
.testi-stars{ color: var(--gold); font-size:15px; margin-bottom:22px; letter-spacing:3px; }
.testi-quote{ font-family:'Fraunces',serif; font-weight:400; font-size: clamp(19px,2.2vw,25px); color: var(--ink-900); line-height:1.5; margin-bottom:28px; }
.testi-who{ display:flex; align-items:center; justify-content:center; gap:12px; }
.testi-avatar{ width:42px; height:42px; border-radius:50%; background: var(--silver-100); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; color: var(--accent-700); }
.testi-who .name{ font-size:14px; color: var(--ink-900); font-weight:600; }
.testi-who .role{ font-size:12px; color: var(--ink-400); }
.testi-dots{ display:flex; gap:8px; justify-content:center; margin-top:28px; }
.testi-dot{ width:8px; height:8px; border-radius:50%; background: var(--silver-300); transition: background var(--dur-fast), transform var(--dur-fast); cursor:pointer; }
.testi-dot.active{ background: var(--accent-700); transform: scale(1.25); }
.testi-arrow{
  position:absolute; top:50%; transform:translateY(-50%); width:44px; height:44px; border-radius:50%;
  background: var(--white); border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
  box-shadow: var(--shadow-sm); transition: box-shadow var(--dur-fast), transform var(--dur-fast);
}
.testi-arrow:hover{ box-shadow: var(--shadow-md); transform: translateY(-50%) scale(1.06); }
.testi-arrow.left{ left:-64px; }
.testi-arrow.right{ right:-64px; }
@media (max-width:900px){ .testi-arrow{ display:none; } }

/* ---------------------------------------------------------------------
   17. MISSION / VISION
   --------------------------------------------------------------------- */
.mv-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:1px; background: var(--line); border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; }
.mv-card{ background: var(--white); padding: 48px 44px; }
.mv-card p{ font-size:19px; color: var(--ink-900); font-family:'Fraunces',serif; font-weight:300; line-height:1.55; }

/* ---------------------------------------------------------------------
   18. DISCLAIMER
   --------------------------------------------------------------------- */
.disclaimer-box{ border:1px solid var(--line); border-left:3px solid var(--accent-700); padding: 30px 34px; background: var(--surface-2); border-radius: 0 var(--r-md) var(--r-md) 0; }
.disclaimer-box p{ font-size:13.5px; color: var(--ink-600); line-height:1.75; }

/* ---------------------------------------------------------------------
   19. LEARNING CENTER
   --------------------------------------------------------------------- */
.cat-tabs{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:48px; }
.cat-tab{
  font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.04em; text-transform:uppercase;
  padding: 10px 18px; border:1px solid var(--line); border-radius: var(--r-full); color: var(--ink-600);
  cursor:pointer; transition: all var(--dur-fast) ease; background: var(--white);
}
.cat-tab.active{ background: var(--ink-900); color: var(--white); border-color: var(--ink-900); }
.cat-tab:not(.active):hover{ border-color: var(--silver-400); color: var(--ink-900); }
.article-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:26px; }
.article-card{
  border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; display:flex; flex-direction:column; background: var(--white);
  transition: box-shadow var(--dur-fast), transform var(--dur-fast);
}
.article-card:hover{ box-shadow: var(--shadow-md); transform: translateY(-4px); }
.article-thumb{
  height:150px; border-bottom:1px solid var(--line);
  display:flex; align-items:flex-end; justify-content:flex-start; padding:12px 14px;
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.08em;
  background-color: var(--silver-100);
}
.article-body{ padding: 24px 24px 28px; display:flex; flex-direction:column; flex:1; }
.article-level{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color: var(--accent-700); margin-bottom:12px; }
.article-card:nth-child(5n+1) .article-level{ color: var(--accent-700); }
.article-card:nth-child(5n+2) .article-level{ color: var(--teal-700); }
.article-card:nth-child(5n+3) .article-level{ color: var(--violet-700); }
.article-card:nth-child(5n+4) .article-level{ color: var(--coral-700); }
.article-card:nth-child(5n+5) .article-level{ color: var(--rose-700); }
.article-body h4{ font-size:16.5px; color: var(--ink-900); margin-bottom:10px; font-family:'Inter',sans-serif; font-weight:600; line-height:1.35; }
.article-body p{ font-size:13.5px; color: var(--ink-600); margin-bottom:18px; flex:1; }
.article-meta{ display:flex; justify-content:space-between; font-size:11.5px; color: var(--ink-400); font-family:'IBM Plex Mono',monospace; padding-top:16px; border-top:1px solid var(--line-soft); }

/* ---------------------------------------------------------------------
   20. FAQ ACCORDION
   --------------------------------------------------------------------- */
.faq-list{ border-top:1px solid var(--line); max-width: 760px; margin: 0 auto; }
.faq-item{ border-bottom:1px solid var(--line); }
.faq-q{
  width:100%; text-align:left; background:none; border:none; padding: 24px 4px;
  display:flex; justify-content:space-between; align-items:center; gap:20px;
  font-size:15.5px; color: var(--ink-900); font-weight:600; font-family:'Inter',sans-serif;
}
.faq-q .plus{ font-family:'IBM Plex Mono',monospace; color: var(--accent-700); font-size:20px; transition: transform var(--dur-fast) ease; flex-shrink:0; }
.faq-item.open .faq-q .plus{ transform: rotate(45deg); }
.faq-a{ max-height:0; overflow:hidden; transition: max-height var(--dur-med) ease; }
.faq-a p{ font-size:14px; color: var(--ink-600); padding: 0 4px 24px; max-width:640px; }

/* ---------------------------------------------------------------------
   21. NEWSLETTER
   --------------------------------------------------------------------- */
.newsletter{
  border:1px solid var(--line); border-radius: var(--r-lg); padding: 52px; display:flex; justify-content:space-between; align-items:center; gap:40px;
  background: linear-gradient(120deg, var(--surface-2), var(--white));
}
.newsletter h3{ font-size:23px; color: var(--ink-900); margin-bottom:8px; }
.newsletter p{ font-size:14px; color: var(--ink-600); }
.newsletter-form{ display:flex; gap:10px; flex:0 0 auto; }
.newsletter-form input{ background: var(--white); border:1px solid var(--silver-300); color: var(--ink-900); padding: 13px 18px; font-size:14px; min-width:260px; border-radius: var(--r-sm); }
.newsletter-form input:focus{ outline:none; border-color: var(--accent-500); }

/* ---------------------------------------------------------------------
   22. PRICING
   --------------------------------------------------------------------- */
.pricing-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:24px; align-items:stretch; margin-bottom:56px; }
.price-card{
  border:1px solid var(--line); border-radius: var(--r-lg); padding:36px 32px; background: var(--white);
  display:flex; flex-direction:column; transition: box-shadow var(--dur-fast), transform var(--dur-fast), border-color var(--dur-fast);
}
.price-card:hover{ box-shadow: var(--shadow-md); transform: translateY(-6px); }
.price-card.featured{
  background: linear-gradient(180deg, var(--ink-900), var(--accent-900));
  color: var(--white); border-color: var(--ink-900); position:relative; overflow:hidden;
}
.price-card.featured::before{
  content:"MOST POPULAR"; position:absolute; top:18px; right:-38px; transform:rotate(45deg);
  background: var(--gold); color: var(--ink-900); font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700;
  padding:5px 46px; letter-spacing:0.06em;
}
.price-card .plan-name{ font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color: var(--accent-700); margin-bottom:16px; }
.price-card.featured .plan-name{ color: var(--silver-300); }
.price-card .plan-price{ font-family:'Fraunces',serif; font-size:32px; line-height:1.15; color: var(--ink-900); margin-bottom:6px; }
.price-card.featured .plan-price{ color: var(--white); }
.price-card .plan-sub{ font-size:13px; color: var(--ink-400); margin-bottom:28px; }
.price-card.featured .plan-sub{ color: var(--silver-400); }
.plan-features{ display:flex; flex-direction:column; gap:13px; margin-bottom:32px; flex:1; }
.plan-tagline{ font-size:13.5px; line-height:1.55; color: var(--ink-500); margin-bottom:24px; }
.price-card.featured .plan-tagline{ color: var(--silver-300); }
.center-tabs{ justify-content:center; }
.plan-gst-note{ text-align:center; font-size:11.5px; color: var(--ink-400); margin-top:16px; letter-spacing:0.01em; }
.price-card.featured .plan-gst-note{ color: var(--silver-400); }
.plan-feature{ display:flex; gap:10px; font-size:13.5px; color: var(--ink-800); align-items:flex-start; }
.price-card.featured .plan-feature{ color: var(--silver-100); }
.plan-feature .chk{ color: var(--up); flex-shrink:0; }
.price-card.featured .plan-feature .chk{ color:#7FDCA6; }

/* ---------------------------------------------------------------------
   23. CONTACT
   --------------------------------------------------------------------- */
.contact-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:64px; }
.contact-info h2{ font-size: var(--fs-h2); margin-bottom:18px; }
.contact-info p{ color: var(--ink-600); font-size:15.5px; margin-bottom:34px; max-width:420px; }
.contact-rows{ display:flex; flex-direction:column; }
.contact-row{ display:flex; justify-content:space-between; padding: 17px 0; border-top:1px solid var(--line); font-size:14px; }
.contact-row:last-child{ border-bottom:1px solid var(--line); }
.contact-row .k{ color: var(--ink-400); font-family:'IBM Plex Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; }
.contact-row .v{ color: var(--ink-900); text-align:right; font-weight:500; }
.social-row{ display:flex; gap:12px; margin-top:30px; }
.social-row a{
  width:40px; height:40px; border:1px solid var(--line); border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace; font-size:12px; color: var(--ink-600); transition: all var(--dur-fast) ease; background: var(--white);
}
.social-row a:hover{ border-color: var(--accent-700); color: var(--accent-700); transform: translateY(-3px); box-shadow: var(--shadow-sm); }

.form-panel{ background: var(--white); border:1px solid var(--line); border-radius: var(--r-lg); padding: 36px; box-shadow: var(--shadow-sm); }
.field{ margin-bottom:20px; }
.field-row{ display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
.field label{ display:block; font-size:12px; color: var(--ink-400); margin-bottom:9px; font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:0.05em; }
.field input, .field textarea, .field select{
  width:100%; background: var(--surface-2); border:1px solid var(--line); color: var(--ink-900);
  padding: 13px 15px; font-size:14px; border-radius: var(--r-sm); transition: border-color var(--dur-fast), background var(--dur-fast);
}
.field input:focus, .field textarea:focus, .field select:focus{ outline:none; border-color: var(--accent-500); background: var(--white); }
.field textarea{ resize:vertical; min-height:100px; }
.field.error input, .field.error textarea{ border-color: var(--down); }
.field-error{ font-size:12px; color: var(--down); margin-top:6px; }
.form-note{ font-size:12px; color: var(--ink-400); margin-top:16px; text-align:center; }
.form-success{ text-align:center; padding: 50px 10px; }
.form-success .check-circle{
  width:56px; height:56px; border-radius:50%; background: rgba(47,134,89,0.1); color: var(--up);
  display:flex; align-items:center; justify-content:center; font-size:24px; margin: 0 auto 18px;
}

.office-strip{ display:grid; grid-template-columns: repeat(3,1fr); gap:1px; background: var(--line); border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; }
.office-card{ background: var(--white); padding: 30px 28px; }
.office-card h4{ font-size:16px; color: var(--ink-900); margin-bottom:8px; font-family:'Inter',sans-serif; }
.office-card p{ font-size:13.5px; color: var(--ink-400); }

/* ---------------------------------------------------------------------
   24. CTA BAND
   --------------------------------------------------------------------- */
.cta-band{
  border-radius: var(--r-lg); padding: 64px; text-align:center; position:relative; overflow:hidden;
  background: linear-gradient(155deg, rgba(15,44,92,0.96), rgba(16,19,26,0.98));
}
.cta-band-art{ position:absolute; inset:0; opacity:0.5; pointer-events:none; }
.cta-band::before{
  content:""; position:absolute; width:500px; height:500px; border-radius:50%; top:-220px; right:-160px;
  background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
}
.cta-band h2{ font-size: clamp(28px,3.4vw,38px); color: var(--white); margin-bottom:14px; position:relative; }
.cta-band p{ font-size:15px; color: var(--silver-400); max-width:480px; margin: 0 auto 32px; position:relative; }
.cta-actions{ display:flex; gap:16px; justify-content:center; flex-wrap:wrap; position:relative; }
.cta-band .btn.primary{ background: var(--white); color: var(--ink-900); border-color: var(--white); }
.cta-band .btn.primary::after{ background: linear-gradient(120deg, transparent 20%, rgba(0,0,0,0.06) 40%, transparent 60%); }
.cta-band .btn:not(.primary){ background: transparent; border-color: rgba(255,255,255,0.3); color: var(--white); }
.cta-band .btn:not(.primary):hover{ background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.5); }

/* ---------------------------------------------------------------------
   25. FOOTER
   --------------------------------------------------------------------- */
footer{ border-top:1px solid var(--line); padding: 64px 0 34px; background: var(--surface-1); }
.footer-top{ display:grid; grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr; gap:40px; margin-bottom:54px; }
.footer-brand .brand{ margin-bottom:16px; }
.footer-brand p{ color: var(--ink-400); font-size:13.5px; max-width:280px; margin-bottom:22px; }
.footer-col h4{
  font-family:'IBM Plex Mono',monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:0.08em;
  color: var(--ink-400); margin-bottom:18px; font-weight:500;
}
.footer-col li{ margin-bottom:11px; }
.footer-col a{ font-size:13.5px; color: var(--ink-600); transition: color var(--dur-fast); }
.footer-col a:hover{ color: var(--accent-700); }
.footer-bottom{ display:flex; justify-content:space-between; align-items:center; padding-top:30px; border-top:1px solid var(--line); font-size:12.5px; color: var(--ink-400); flex-wrap:wrap; gap:12px; }
.back-to-top{
  width:40px; height:40px; border-radius:50%; border:1px solid var(--line); background: var(--white);
  display:flex; align-items:center; justify-content:center; transition: all var(--dur-fast) ease; box-shadow: var(--shadow-xs);
}
.back-to-top:hover{ transform: translateY(-4px); box-shadow: var(--shadow-md); }

/* ---------------------------------------------------------------------
   16b. INTERACTIVE TOOL SHOWCASE
   --------------------------------------------------------------------- */
.showcase-wrap{ display:grid; grid-template-columns: 0.85fr 1.15fr; gap:56px; align-items:center; }
.showcase-tabs{ display:flex; flex-direction:column; gap:6px; }
.showcase-tab{
  text-align:left; padding: 20px 22px; border-radius: var(--r-md); border:1px solid transparent;
  background: transparent; transition: all var(--dur-fast) ease; cursor:pointer;
}
.showcase-tab:hover{ background: var(--surface-2); }
.showcase-tab.active{ background: var(--white); border-color: var(--line); box-shadow: var(--shadow-sm); }
.showcase-tab .stab-label{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color: var(--ink-400); margin-bottom:6px; }
.showcase-tab.active .stab-label{ color: var(--accent-700); }
.showcase-tab .stab-title{ font-size:15.5px; font-weight:600; color: var(--ink-900); }
.showcase-panel{
  border:1px solid var(--line); border-radius: var(--r-lg); background: var(--white); box-shadow: var(--shadow-lg);
  padding:36px; min-height:340px;
}
.showcase-panel h3{ font-size:22px; margin-bottom:12px; }
.showcase-panel > p{ font-size:14.5px; color: var(--ink-600); margin-bottom:26px; max-width:440px; }
.showcase-rows{ border-top:1px solid var(--line-soft); }

/* ---------------------------------------------------------------------
   16c. COMPARISON TABLE
   --------------------------------------------------------------------- */
.compare-table{ width:100%; border-collapse:collapse; border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; }
.compare-table th, .compare-table td{ padding: 18px 22px; text-align:center; border-bottom:1px solid var(--line); font-size:13.5px; }
.compare-table th{ background: var(--surface-2); font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.05em; text-transform:uppercase; color: var(--ink-600); font-weight:600; }
.compare-table th:first-child, .compare-table td:first-child{ text-align:left; }
.compare-table td:first-child{ color: var(--ink-800); font-weight:500; }
.compare-table tr:last-child td{ border-bottom:none; }
.compare-table th.mv-col{ background: var(--ink-900); color: var(--white); }
.compare-yes{ color: var(--up); font-weight:700; }
.compare-no{ color: var(--silver-400); }
.compare-val{ color: var(--ink-800); font-size:12.5px; font-weight:600; }
.compare-scroll{ overflow-x:auto; border-radius: var(--r-md); }

/* ---------------------------------------------------------------------
   16d. SECURITY & TRUST
   --------------------------------------------------------------------- */
.security-grid{ display:grid; grid-template-columns: repeat(2,1fr); gap:20px; }
.security-card{ display:flex; gap:18px; padding:26px; border:1px solid var(--line); border-radius: var(--r-md); background: var(--white); transition: box-shadow var(--dur-fast); }
.security-card:hover{ box-shadow: var(--shadow-sm); }
.security-icon{
  width:44px; height:44px; flex-shrink:0; border-radius: var(--r-sm); background: var(--accent-100); color: var(--accent-800, var(--accent-700));
  display:flex; align-items:center; justify-content:center; font-size:18px;
}
.security-card h4{ font-size:15px; color: var(--ink-900); margin-bottom:6px; font-family:'Inter',sans-serif; font-weight:600; }
.security-card p{ font-size:13px; color: var(--ink-600); }

/* ---------------------------------------------------------------------
   16e. AWARDS
   --------------------------------------------------------------------- */
.awards-row{ display:flex; flex-direction:column; }
.award-item{ display:flex; align-items:center; gap:24px; padding:24px 0; border-top:1px solid var(--line); }
.award-item:last-child{ border-bottom:1px solid var(--line); }
.award-year{ font-family:'IBM Plex Mono',monospace; font-size:14px; color: var(--accent-700); width:60px; flex-shrink:0; }
.award-item h4{ font-size:16px; color: var(--ink-900); font-family:'Inter',sans-serif; font-weight:600; }
.award-item .org{ font-size:12.5px; color: var(--ink-400); margin-top:3px; }
.award-badge{ margin-left:auto; font-size:22px; }

/* ---------------------------------------------------------------------
   16f. INTEGRATIONS
   --------------------------------------------------------------------- */
.integrations-grid{ display:grid; grid-template-columns: repeat(6,1fr); gap:14px; }
.integration-chip{
  border:1px solid var(--line); border-radius: var(--r-md); padding:22px 16px; text-align:center; background: var(--white);
  font-size:13px; color: var(--ink-800); font-weight:500; transition: all var(--dur-fast) ease;
}
.integration-chip:hover{ border-color: var(--accent-500); transform: translateY(-3px); box-shadow: var(--shadow-sm); }

@media (max-width: 960px){
  .showcase-wrap{ grid-template-columns:1fr; }
  .security-grid{ grid-template-columns:1fr; }
  .integrations-grid{ grid-template-columns: repeat(3,1fr); }
  .compare-table th, .compare-table td{ padding:14px 12px; font-size:12.5px; }
}
@media (max-width: 620px){
  .integrations-grid{ grid-template-columns: repeat(2,1fr); }
}

/* ---------------------------------------------------------------------
   16g. MARKET OVERVIEW — sector performance & top movers
   --------------------------------------------------------------------- */
.overview-wrap{ display:grid; grid-template-columns: 1.15fr 0.85fr; gap:48px; }
.sector-list{ display:flex; flex-direction:column; gap:16px; }
.sector-row{ display:grid; grid-template-columns: 180px 1fr 70px; align-items:center; gap:16px; }
.sector-name{ font-size:13.5px; color: var(--ink-800); }
.sector-bar-track{ height:8px; border-radius: var(--r-full); background: var(--silver-150); position:relative; overflow:hidden; }
.sector-bar-fill{ height:100%; border-radius: var(--r-full); transition: width 1.1s var(--ease-out); }
.sector-bar-fill.up{ background: linear-gradient(90deg, var(--up), #6FCF9A); }
.sector-bar-fill.down{ background: linear-gradient(90deg, var(--down), #E38C82); }
.sector-change{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; text-align:right; font-weight:600; }
.sector-change.up{ color: var(--up); }
.sector-change.down{ color: var(--down); }

.movers-panel{ border:1px solid var(--line); border-radius: var(--r-md); background: var(--white); box-shadow: var(--shadow-sm); overflow:hidden; }
.movers-tabs{ display:flex; border-bottom:1px solid var(--line); }
.movers-tab{
  flex:1; text-align:center; padding:16px; font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.05em; text-transform:uppercase;
  color: var(--ink-400); border-bottom:2px solid transparent; transition: all var(--dur-fast) ease; background: transparent;
}
.movers-tab.active{ color: var(--ink-900); border-bottom-color: var(--accent-700); }
.mover-row{ display:flex; justify-content:space-between; align-items:center; padding:16px 22px; border-bottom:1px solid var(--line-soft); font-size:13.5px; }
.mover-row:last-child{ border-bottom:none; }
.mover-sym{ font-weight:600; color: var(--ink-900); }
.mover-price{ font-family:'IBM Plex Mono',monospace; color: var(--ink-600); font-size:12.5px; }
.mover-change{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:12.5px; }
.mover-change.up{ color: var(--up); }
.mover-change.down{ color: var(--down); }

/* ---------------------------------------------------------------------
   16h. MARKET INSIGHTS BLOG
   --------------------------------------------------------------------- */
.insight-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:26px; }
.insight-card{ border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; background: var(--white); transition: box-shadow var(--dur-fast), transform var(--dur-fast); display:flex; flex-direction:column; height:100%; }
.insight-thumb{ height:150px; background-size:cover; background-position:center; border-bottom:1px solid var(--line); }
.insight-card > .insight-tag, .insight-card > h4, .insight-card > p, .insight-card > .insight-meta{ margin-left:28px; margin-right:28px; }
.insight-card > .insight-tag{ margin-top:22px; }
.insight-card > .insight-meta{ margin-bottom:26px; }
.insight-card:hover{ box-shadow: var(--shadow-md); transform: translateY(-4px); }
.insight-tag{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color: var(--accent-700); background: var(--accent-100); padding:5px 11px; border-radius: var(--r-full); margin-bottom:16px; }
.insight-card:nth-child(6n+1) .insight-tag{ color: var(--accent-700); background: var(--accent-100); }
.insight-card:nth-child(6n+2) .insight-tag{ color: var(--teal-700); background: var(--teal-100); }
.insight-card:nth-child(6n+3) .insight-tag{ color: var(--violet-700); background: var(--violet-100); }
.insight-card:nth-child(6n+4) .insight-tag{ color: var(--coral-700); background: var(--coral-100); }
.insight-card:nth-child(6n+5) .insight-tag{ color: var(--rose-700); background: var(--rose-100); }
.insight-card:nth-child(6n+6) .insight-tag{ color: var(--gold); background: rgba(232,114,10,0.13); }
.insight-card h4{ font-size:16.5px; color: var(--ink-900); margin-bottom:12px; font-family:'Inter',sans-serif; font-weight:600; line-height:1.4; }
.insight-card p{ font-size:13.5px; color: var(--ink-600); flex:1; margin-bottom:20px; }
.insight-meta{ display:flex; justify-content:space-between; align-items:center; padding-top:16px; border-top:1px solid var(--line-soft); font-size:12px; color: var(--ink-400); }
.insight-author{ display:flex; align-items:center; gap:8px; }
.insight-avatar{ width:24px; height:24px; border-radius:50%; background: var(--silver-100); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-size:11px; color: var(--accent-700); }

/* ---------------------------------------------------------------------
   16i. GLOSSARY
   --------------------------------------------------------------------- */
.glossary-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:0; border-top:1px solid var(--line); border-left:1px solid var(--line); }
.glossary-item{ padding:24px 26px; border-right:1px solid var(--line); border-bottom:1px solid var(--line); }
.glossary-item .term{ font-family:'Inter',sans-serif; font-weight:600; font-size:15px; color: var(--ink-900); margin-bottom:6px; }
.glossary-item .def{ font-size:13.5px; color: var(--ink-600); }

/* ---------------------------------------------------------------------
   16j. CAREERS
   --------------------------------------------------------------------- */
.careers-list{ border-top:1px solid var(--line); }
.role-row{ display:grid; grid-template-columns: 1.4fr 0.7fr 0.9fr 0.6fr auto; align-items:center; gap:16px; padding:22px 4px; border-bottom:1px solid var(--line); transition: background var(--dur-fast); }
.role-row:hover{ background: var(--surface-2); }
.role-title{ font-size:15px; color: var(--ink-900); font-weight:600; }
.role-dept, .role-loc, .role-type{ font-size:13px; color: var(--ink-400); font-family:'IBM Plex Mono',monospace; }

/* ---------------------------------------------------------------------
   16k. WEBINARS
   --------------------------------------------------------------------- */
.webinar-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:20px; }
.webinar-card{ border:1px solid var(--line); border-radius: var(--r-md); padding:24px; background: var(--white); transition: box-shadow var(--dur-fast), transform var(--dur-fast); }
.webinar-card:hover{ box-shadow: var(--shadow-md); transform: translateY(-4px); }
.webinar-status{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.06em; text-transform:uppercase; padding:5px 10px; border-radius: var(--r-full); margin-bottom:16px; }
.webinar-status.Upcoming{ background: var(--accent-100); color: var(--accent-800, var(--accent-700)); }
.webinar-status.Recorded{ background: var(--silver-100); color: var(--ink-600); }
.webinar-card h4{ font-size:15px; color: var(--ink-900); margin-bottom:10px; font-family:'Inter',sans-serif; font-weight:600; line-height:1.4; }
.webinar-card .meta{ font-size:12.5px; color: var(--ink-400); }

/* ---------------------------------------------------------------------
   16l. PRESS MENTIONS
   --------------------------------------------------------------------- */
.press-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:24px; }
.press-card{ border:1px solid var(--line); border-radius: var(--r-md); padding:28px; background: var(--white); }
.press-card .outlet{ font-family:'Fraunces',serif; font-size:16px; color: var(--ink-900); margin-bottom:14px; }
.press-card .quote{ font-size:13.5px; color: var(--ink-600); line-height:1.7; font-style:italic; }

@media (max-width: 960px){
  .overview-wrap{ grid-template-columns:1fr; }
  .insight-grid, .press-grid{ grid-template-columns: 1fr 1fr; }
  .glossary-grid{ grid-template-columns: 1fr; }
  .webinar-grid{ grid-template-columns: 1fr 1fr; }
  .role-row{ grid-template-columns: 1fr 1fr; row-gap:8px; }
  .sector-row{ grid-template-columns: 120px 1fr 60px; }
}
@media (max-width: 620px){
  .insight-grid, .press-grid, .webinar-grid{ grid-template-columns: 1fr; }
  .role-row{ grid-template-columns: 1fr; }
}

/* ---------------------------------------------------------------------
   16m. STOCK SCREENER
   --------------------------------------------------------------------- */
.screener-controls{ display:flex; gap:16px; margin-bottom:32px; flex-wrap:wrap; align-items:center; }
.screener-search{
  flex:1; min-width:220px; padding:13px 18px; border:1px solid var(--silver-300); border-radius: var(--r-sm);
  background: var(--white); font-size:14px; transition: border-color var(--dur-fast);
}
.screener-search:focus{ outline:none; border-color: var(--accent-500); }
.screener-select{
  padding:13px 16px; border:1px solid var(--silver-300); border-radius: var(--r-sm); background: var(--white); font-size:13.5px; color: var(--ink-800);
}
.screener-table-wrap{ overflow-x:auto; border:1px solid var(--line); border-radius: var(--r-md); }
.screener-table{ width:100%; border-collapse:collapse; min-width:640px; }
.screener-table th{
  text-align:left; padding:16px 20px; background: var(--surface-2); font-family:'IBM Plex Mono',monospace; font-size:11px;
  letter-spacing:.05em; text-transform:uppercase; color: var(--ink-600); border-bottom:1px solid var(--line); font-weight:600;
}
.screener-table td{ padding:16px 20px; border-bottom:1px solid var(--line-soft); font-size:13.5px; }
.screener-table tr:last-child td{ border-bottom:none; }
.screener-table tr:hover td{ background: var(--surface-2); }
.screener-sym{ font-weight:600; color: var(--ink-900); }
.screener-name{ color: var(--ink-400); font-size:12.5px; }
.screener-sector-tag{ font-family:'IBM Plex Mono',monospace; font-size:11px; color: var(--ink-600); background: var(--surface-2); padding:4px 10px; border-radius: var(--r-full); }
.screener-change{ font-family:'IBM Plex Mono',monospace; font-weight:600; }
.screener-change.up{ color: var(--up); }
.screener-change.down{ color: var(--down); }
.screener-empty{ padding:40px; text-align:center; color: var(--ink-400); font-size:14px; }

/* ---------------------------------------------------------------------
   16n. ECONOMIC CALENDAR
   --------------------------------------------------------------------- */
.calendar-list{ border-top:1px solid var(--line); }
.calendar-row{ display:grid; grid-template-columns: 90px 1fr 100px; align-items:center; gap:16px; padding:20px 4px; border-bottom:1px solid var(--line); }
.calendar-date{ font-family:'IBM Plex Mono',monospace; font-size:13px; color: var(--accent-700); font-weight:600; }
.calendar-event{ font-size:14.5px; color: var(--ink-800); }
.impact-badge{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; padding:5px 12px; border-radius: var(--r-full); text-align:center; }
.impact-badge.High{ background: rgba(180,70,60,0.1); color: var(--down); }
.impact-badge.Medium{ background: rgba(232,114,10,0.13); color: var(--gold); }
.impact-badge.Low{ background: var(--silver-100); color: var(--ink-600); }

/* ---------------------------------------------------------------------
   16o. CURRENCIES & COMMODITIES
   --------------------------------------------------------------------- */
.cc-grid{ display:grid; grid-template-columns: repeat(6,1fr); gap:16px; }
.cc-card{ border:1px solid var(--line); border-radius: var(--r-md); padding:22px 18px; background: var(--white); text-align:center; transition: box-shadow var(--dur-fast); }
.cc-card:hover{ box-shadow: var(--shadow-sm); }
.cc-name{ font-size:12px; color: var(--ink-400); margin-bottom:10px; }
.cc-value{ font-family:'IBM Plex Mono',monospace; font-size:16px; color: var(--ink-900); font-weight:600; margin-bottom:6px; }
.cc-change{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:600; }
.cc-change.up{ color: var(--up); }
.cc-change.down{ color: var(--down); }

@media (max-width: 960px){
  .cc-grid{ grid-template-columns: repeat(3,1fr); }
  .calendar-row{ grid-template-columns: 70px 1fr 84px; }
}
@media (max-width: 620px){
  .cc-grid{ grid-template-columns: repeat(2,1fr); }
  .screener-controls{ flex-direction:column; align-items:stretch; }
}

/* ---------------------------------------------------------------------
   16p. PRODUCT ROADMAP
   --------------------------------------------------------------------- */
.roadmap-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:20px; }
.roadmap-card{ border:1px solid var(--line); border-radius: var(--r-md); padding:26px; background: var(--white); }
.roadmap-q{ font-family:'IBM Plex Mono',monospace; font-size:13px; color: var(--ink-900); font-weight:600; margin-bottom:10px; }
.roadmap-status{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.05em; text-transform:uppercase; padding:4px 10px; border-radius: var(--r-full); margin-bottom:18px; }
.roadmap-status.InProgress{ background: rgba(47,134,89,0.1); color: var(--up); }
.roadmap-status.Planned{ background: var(--accent-100); color: var(--accent-800, var(--accent-700)); }
.roadmap-status.Exploring{ background: var(--silver-100); color: var(--ink-600); }
.roadmap-list{ display:flex; flex-direction:column; gap:10px; }
.roadmap-item{ font-size:13px; color: var(--ink-600); display:flex; gap:8px; align-items:flex-start; }
.roadmap-item::before{ content:"·"; color: var(--accent-700); font-weight:700; }

/* ---------------------------------------------------------------------
   16q. FEATURE MATRIX (pricing detail)
   --------------------------------------------------------------------- */
.matrix-scroll{ overflow-x:auto; border:1px solid var(--line); border-radius: var(--r-md); margin-top:56px; }
.matrix-table{ width:100%; border-collapse:collapse; min-width:600px; }
.matrix-table th, .matrix-table td{ padding:16px 22px; text-align:center; border-bottom:1px solid var(--line); font-size:13.5px; }
.matrix-table th{ background: var(--surface-2); font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.05em; text-transform:uppercase; color: var(--ink-600); }
.matrix-table th:first-child, .matrix-table td:first-child{ text-align:left; }
.matrix-table td:first-child{ color: var(--ink-800); }
.matrix-table tr:last-child td{ border-bottom:none; }

/* ---------------------------------------------------------------------
   16r. INVESTOR PERSONAS
   --------------------------------------------------------------------- */
.persona-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:20px; }
.persona-card{ border:1px solid var(--line); border-radius: var(--r-md); padding:28px; background: var(--white); transition: box-shadow var(--dur-fast), transform var(--dur-fast); }
.persona-card:hover{ box-shadow: var(--shadow-md); transform: translateY(-4px); }
.persona-tag{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color: var(--accent-700); margin-bottom:14px; }
.persona-card:nth-child(4n+1) .persona-tag{ color: var(--accent-700); }
.persona-card:nth-child(4n+2) .persona-tag{ color: var(--teal-700); }
.persona-card:nth-child(4n+3) .persona-tag{ color: var(--violet-700); }
.persona-card:nth-child(4n+4) .persona-tag{ color: var(--coral-700); }
.persona-card h4{ font-size:17px; color: var(--ink-900); margin-bottom:10px; }
.persona-card p{ font-size:13px; color: var(--ink-600); margin-bottom:18px; }
.persona-tools{ display:flex; flex-direction:column; gap:8px; padding-top:16px; border-top:1px solid var(--line-soft); }
.persona-tool{ font-size:12px; color: var(--ink-800); font-family:'IBM Plex Mono',monospace; }

/* ---------------------------------------------------------------------
   16s. DATA SOURCES
   --------------------------------------------------------------------- */
.sources-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:20px; }
.source-card{ padding:24px 0; border-top:1px solid var(--line); }
.source-card h4{ font-size:15px; color: var(--ink-900); margin-bottom:8px; font-family:'Inter',sans-serif; font-weight:600; }
.source-card p{ font-size:13px; color: var(--ink-600); }

/* ---------------------------------------------------------------------
   16t. TRUST BADGES
   --------------------------------------------------------------------- */
.trust-row{ display:flex; justify-content:center; gap:36px; flex-wrap:wrap; padding: 28px 0; }
.trust-badge{ display:flex; align-items:center; gap:8px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.06em; color: var(--ink-400); }
.trust-badge::before{ content:"✓"; color: var(--up); font-weight:700; }

@media (max-width: 960px){
  .roadmap-grid, .persona-grid, .sources-grid{ grid-template-columns: 1fr 1fr; }
}
@media (max-width: 620px){
  .roadmap-grid, .persona-grid, .sources-grid{ grid-template-columns: 1fr; }
  .trust-row{ gap:18px; }
}

/* ---------------------------------------------------------------------
   16u. HELP CENTER
   --------------------------------------------------------------------- */
.help-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:24px; }
.help-card{ border:1px solid var(--line); border-radius: var(--r-md); padding:26px; background: var(--white); transition: box-shadow var(--dur-fast), transform var(--dur-fast); }
.help-card:hover{ box-shadow: var(--shadow-sm); transform: translateY(-3px); }
.help-cat{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color: var(--accent-700); margin-bottom:14px; }
.help-card h4{ font-size:15px; color: var(--ink-900); margin-bottom:8px; font-family:'Inter',sans-serif; font-weight:600; line-height:1.4; }
.help-card p{ font-size:13px; color: var(--ink-600); }

/* ---------------------------------------------------------------------
   16v. BEGINNER MISTAKES
   --------------------------------------------------------------------- */
.mistakes-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:1px; background: var(--line); border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; }
.mistake-card{ background: var(--white); padding:26px; }
.mistake-card h4{ font-size:14.5px; color: var(--ink-900); margin-bottom:8px; font-family:'Inter',sans-serif; font-weight:600; display:flex; gap:10px; align-items:flex-start; }
.mistake-card h4::before{ content:"!"; width:20px; height:20px; flex-shrink:0; border-radius:50%; background: rgba(180,70,60,0.1); color: var(--down); font-family:'IBM Plex Mono',monospace; font-size:12px; display:flex; align-items:center; justify-content:center; }
.mistake-card p{ font-size:13px; color: var(--ink-600); padding-left:30px; }

/* ---------------------------------------------------------------------
   16w. SITEMAP (footer)
   --------------------------------------------------------------------- */
.sitemap-row{ display:flex; flex-wrap:wrap; gap:10px 22px; padding: 28px 0; border-top:1px solid var(--line); }
.sitemap-row a{ font-size:12.5px; color: var(--ink-400); transition: color var(--dur-fast); }
.sitemap-row a:hover{ color: var(--accent-700); }

@media (max-width: 960px){
  .help-grid, .mistakes-grid{ grid-template-columns: 1fr 1fr; }
}
@media (max-width: 620px){
  .help-grid, .mistakes-grid{ grid-template-columns: 1fr; }
}

/* ---------------------------------------------------------------------
   16x. CASE STUDIES
   --------------------------------------------------------------------- */
.case-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:24px; }
.case-card{ border:1px solid var(--line); border-radius: var(--r-md); padding:28px; background: var(--white); }
.case-head{ display:flex; align-items:center; gap:12px; margin-bottom:22px; padding-bottom:20px; border-bottom:1px solid var(--line-soft); }
.case-avatar{ width:40px; height:40px; border-radius:50%; background: var(--silver-100); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; color: var(--accent-700); }
.case-head .name{ font-size:14px; color: var(--ink-900); font-weight:600; }
.case-head .role{ font-size:12px; color: var(--ink-400); }
.case-row{ margin-bottom:16px; }
.case-label{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color: var(--ink-400); margin-bottom:6px; }
.case-label.before{ color: var(--down); }
.case-label.after{ color: var(--up); }
.case-text{ font-size:13.5px; color: var(--ink-800); }
.case-metric{ margin-top:20px; padding-top:18px; border-top:1px solid var(--line-soft); font-family:'IBM Plex Mono',monospace; font-size:13px; color: var(--accent-800, var(--accent-700)); font-weight:600; }
.case-disclaimer{ font-size:11.5px; color: var(--ink-400); margin-top:20px; }

/* ---------------------------------------------------------------------
   16y. API PREVIEW
   --------------------------------------------------------------------- */
.api-wrap{ display:grid; grid-template-columns: 0.85fr 1.15fr; gap:56px; align-items:center; }
.api-copy h2{ font-size: var(--fs-h2); margin-bottom:18px; }
.api-copy p{ font-size:15px; color: var(--ink-600); margin-bottom:24px; }
.api-code{
  background: var(--ink-900); border-radius: var(--r-lg); padding:28px; box-shadow: var(--shadow-lg);
  font-family:'IBM Plex Mono',monospace; font-size:12.5px; line-height:1.8; color: var(--silver-200); overflow-x:auto;
}
.api-code .dots{ display:flex; gap:6px; margin-bottom:20px; }
.api-code .dot{ width:10px; height:10px; border-radius:50%; background: var(--silver-600); }
.api-code pre{ margin:0; white-space:pre-wrap; word-break:break-word; }

@media (max-width: 960px){
  .case-grid{ grid-template-columns: 1fr; }
  .api-wrap{ grid-template-columns:1fr; }
}

/* ---------------------------------------------------------------------
   5b. PAGE LOADER (initial splash)
   --------------------------------------------------------------------- */
.page-loader{
  position: fixed; inset:0; z-index: 500; background: var(--white);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
  transition: opacity 500ms ease, visibility 500ms ease;
}
.page-loader.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
.loader-mark{
  width:auto; height:76px; object-fit:contain;
  animation: floatSlow 2.4s ease-in-out infinite;
  filter: drop-shadow(0 8px 20px rgba(10,33,72,0.18));
}
.loader-bar-track{ width:180px; height:3px; border-radius: var(--r-full); background: var(--silver-150); overflow:hidden; }
.loader-bar-fill{ height:100%; background: linear-gradient(90deg, var(--accent-500), var(--accent-900)); border-radius: var(--r-full); transition: width 200ms ease; }
.loader-label{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color: var(--ink-400); }

/* ---------------------------------------------------------------------
   16z. FLOATING WHATSAPP BUTTON
   --------------------------------------------------------------------- */
.wa-wrap{ position: fixed; right: 28px; bottom: 28px; z-index: 90; display:flex; align-items:center; gap:12px; }
.wa-tooltip{
  background: var(--ink-900); color: var(--white); font-size:13px; font-weight:500;
  padding:10px 16px; border-radius: var(--r-full); white-space:nowrap; box-shadow: var(--shadow-md);
  opacity:0; transform: translateX(8px); pointer-events:none;
  transition: opacity var(--dur-fast) ease, transform var(--dur-fast) ease;
}
.wa-wrap:hover .wa-tooltip{ opacity:1; transform:translateX(0); }
.wa-button{
  position:relative; width:58px; height:58px; border-radius:50%; border:none;
  background: linear-gradient(180deg, #2CE267, #1DA851);
  color: var(--white); display:flex; align-items:center; justify-content:center;
  box-shadow: 0 10px 26px rgba(29,168,81,0.4); transition: transform var(--dur-fast) var(--ease-out);
}
.wa-button:hover{ transform: scale(1.07); }
.wa-button svg{ width:30px; height:30px; }
.wa-ring{
  position:absolute; inset:0; border-radius:50%; border:2px solid #25D366;
  animation: waPulse 2.2s ease-out infinite;
}
@keyframes waPulse{
  0%{ transform: scale(1); opacity:0.7; }
  100%{ transform: scale(1.7); opacity:0; }
}

/* ---------------------------------------------------------------------
   16za. ACCESSIBILITY STATEMENT
   --------------------------------------------------------------------- */
.a11y-list{ display:flex; flex-direction:column; gap:0; max-width:720px; }
.a11y-item{ display:flex; gap:16px; padding:20px 0; border-top:1px solid var(--line); }
.a11y-item:last-child{ border-bottom:1px solid var(--line); }
