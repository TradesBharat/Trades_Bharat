.a11y-item .mark-ico{ width:28px; height:28px; flex-shrink:0; border-radius:50%; background: rgba(47,134,89,0.1); color: var(--up); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
.a11y-item h4{ font-size:14.5px; color: var(--ink-900); margin-bottom:5px; font-family:'Inter',sans-serif; font-weight:600; }
.a11y-item p{ font-size:13px; color: var(--ink-600); }

@media (max-width: 620px){
  .wa-wrap{ right:18px; bottom:18px; }
  .wa-button{ width:52px; height:52px; }
  .wa-button svg{ width:26px; height:26px; }
  .wa-tooltip{ display:none; }
}

/* ---------------------------------------------------------------------
   16zb. NEWSLETTER ARCHIVE
   --------------------------------------------------------------------- */
.archive-list{ display:flex; flex-direction:column; max-width:760px; }
.archive-row{ display:flex; justify-content:space-between; align-items:center; gap:20px; padding:20px 0; border-top:1px solid var(--line); }
.archive-row:last-child{ border-bottom:1px solid var(--line); }
.archive-issue{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; color: var(--accent-700); width:90px; flex-shrink:0; }
.archive-title{ font-size:14.5px; color: var(--ink-800); flex:1; }
.archive-date{ font-size:12.5px; color: var(--ink-400); font-family:'IBM Plex Mono',monospace; flex-shrink:0; }

/* ---------------------------------------------------------------------
   16zc. RISK DISCLOSURE & COOKIE POLICY
   --------------------------------------------------------------------- */
.legal-grid{ display:grid; grid-template-columns: repeat(2,1fr); gap:20px; }
.legal-card{ padding:24px; border:1px solid var(--line); border-radius: var(--r-md); background: var(--surface-2); }
.legal-card h4{ font-size:14.5px; color: var(--ink-900); margin-bottom:8px; font-family:'Inter',sans-serif; font-weight:600; }
.legal-card p{ font-size:13px; color: var(--ink-600); }

@media (max-width: 620px){
  .legal-grid{ grid-template-columns: 1fr; }
}

/* ---------------------------------------------------------------------
   16zd. SUPPORTED PLATFORMS
   --------------------------------------------------------------------- */
.platforms-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:18px; }
.platform-card{ padding:22px; border:1px solid var(--line); border-radius: var(--r-md); background: var(--white); text-align:center; }
.platform-card h4{ font-size:14.5px; color: var(--ink-900); margin-bottom:6px; font-family:'Inter',sans-serif; font-weight:600; }
.platform-card p{ font-size:12px; color: var(--ink-400); }

/* ---------------------------------------------------------------------
   16ze. COMMUNITY
   --------------------------------------------------------------------- */
.community-band{
  border-radius: var(--r-lg); border:1px solid var(--line); background: linear-gradient(120deg, var(--surface-2), var(--white));
  padding:52px; display:grid; grid-template-columns: 1.1fr 0.9fr; gap:48px; align-items:center;
}
.community-copy h2{ font-size: var(--fs-h2); margin-bottom:16px; }
.community-copy p{ font-size:15px; color: var(--ink-600); margin-bottom:26px; max-width:440px; }
.community-stats{ display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
.community-stat{ padding:20px; border:1px solid var(--line); border-radius: var(--r-md); background: var(--white); text-align:center; }
.community-stat .num{ font-family:'IBM Plex Mono',monospace; font-size:22px; color: var(--ink-900); font-weight:600; }
.community-stat .label{ font-size:11.5px; color: var(--ink-400); margin-top:6px; }

@media (max-width: 960px){
  .platforms-grid{ grid-template-columns: 1fr 1fr; }
  .community-band{ grid-template-columns:1fr; padding:36px; }
}

/* ---------------------------------------------------------------------
   16zf. PAYMENT METHODS
   --------------------------------------------------------------------- */
.payment-row{ display:flex; justify-content:center; gap:14px; flex-wrap:wrap; padding:24px 0; }
.payment-chip{
  padding:10px 18px; border:1px solid var(--line); border-radius: var(--r-full); background: var(--white);
  font-family:'IBM Plex Mono',monospace; font-size:11.5px; color: var(--ink-600);
}

/* ---------------------------------------------------------------------
   16zg. QUICK FACTS
   --------------------------------------------------------------------- */
.facts-row{ display:flex; justify-content:center; gap:48px; flex-wrap:wrap; padding:8px 0 40px; }
.fact-item{ text-align:center; }
.fact-item .v{ font-family:'IBM Plex Mono',monospace; font-size:18px; color: var(--ink-900); font-weight:600; }
.fact-item .k{ font-size:11px; color: var(--ink-400); margin-top:4px; letter-spacing:.04em; text-transform:uppercase; }

/* ---------------------------------------------------------------------
   16zh. INSTRUMENT TYPES
   --------------------------------------------------------------------- */
.instrument-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:1px; background: var(--line); border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; }
.instrument-card{ background: var(--white); padding:28px 24px; transition: background var(--dur-fast); }
.instrument-card:hover{ background: var(--surface-2); }
.instrument-card h4{ font-size:15.5px; color: var(--ink-900); margin-bottom:10px; font-family:'Inter',sans-serif; font-weight:600; }
.instrument-card p{ font-size:13px; color: var(--ink-600); }

@media (max-width: 960px){
  .instrument-grid{ grid-template-columns: 1fr 1fr; }
}
@media (max-width: 620px){
  .instrument-grid{ grid-template-columns: 1fr; }
}

/* ---------------------------------------------------------------------
   16zi. PPT SERVICE — Payment for Positive Trade
   --------------------------------------------------------------------- */
.ppt-hero-panel{
  border-radius: var(--r-lg); padding: 56px; position:relative; overflow:hidden;
  background: linear-gradient(155deg, var(--ink-900), var(--accent-900));
  color: var(--white); margin-bottom: 56px;
}
.ppt-hero-panel::before{
  content:""; position:absolute; width:460px; height:460px; border-radius:50%; top:-200px; right:-140px;
  background: radial-gradient(circle, rgba(232,114,10,0.18), transparent 70%);
}
.ppt-hero-panel .kicker{ color: var(--gold); position:relative; }
.ppt-hero-panel .kicker::before{ background: var(--gold); }
.ppt-hero-panel h2{ color: var(--white); font-size: clamp(28px,3.6vw,42px); margin-bottom:18px; max-width:640px; position:relative; }
.ppt-hero-panel p{ color: var(--silver-400); font-size:15.5px; max-width:560px; margin-bottom:34px; position:relative; }
.ppt-stats-row{ display:flex; gap:44px; flex-wrap:wrap; padding-top:28px; border-top:1px solid rgba(255,255,255,0.14); position:relative; }
.ppt-stat .num{ font-family:'IBM Plex Mono',monospace; font-size:28px; color: var(--white); font-weight:600; }
.ppt-stat .label{ font-size:12px; color: var(--silver-400); margin-top:6px; }

.ppt-features-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:20px; }
.ppt-feature-card{ border:1px solid var(--line); border-radius: var(--r-md); padding:28px; background: var(--white); transition: box-shadow var(--dur-fast), transform var(--dur-fast); }
.ppt-feature-card:hover{ box-shadow: var(--shadow-md); transform: translateY(-4px); }
.ppt-feature-icon{ font-size:26px; margin-bottom:16px; }
.ppt-feature-tag{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color: var(--accent-700); background: var(--accent-100); padding:4px 10px; border-radius: var(--r-full); display:inline-block; margin-bottom:14px; }
.ppt-feature-card:nth-child(3n+2) .ppt-feature-tag{ color: var(--teal-700); background: var(--teal-100); }
.ppt-feature-card:nth-child(3n+3) .ppt-feature-tag{ color: var(--violet-700); background: var(--violet-100); }
.ppt-feature-card h4{ font-size:16px; color: var(--ink-900); margin-bottom:8px; font-family:'Inter',sans-serif; font-weight:600; }
.ppt-feature-card p{ font-size:13.5px; color: var(--ink-600); }

.ppt-process-grid{ display:grid; grid-template-columns: repeat(5,1fr); border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; background: var(--line); gap:1px; }
.ppt-process-cell{ background: var(--white); padding:26px 20px; }
.ppt-process-cell .n{ font-family:'IBM Plex Mono',monospace; color: var(--accent-300); font-size:13px; margin-bottom:10px; }
.ppt-process-cell .icon{ font-size:22px; margin-bottom:14px; }
.ppt-process-cell h4{ font-size:13.5px; color: var(--ink-900); margin-bottom:8px; font-family:'Inter',sans-serif; font-weight:600; line-height:1.35; }
.ppt-process-cell p{ font-size:12px; color: var(--ink-400); }

.ppt-pricing-wrap{ display:flex; justify-content:center; }
.ppt-pricing-panel{
  border:1px solid var(--line); border-radius: var(--r-lg); background: var(--surface-2);
  padding:56px; display:grid; grid-template-columns: 1fr 440px; gap:56px; align-items:center;
}
.ppt-pricing-info .kicker{ margin-bottom:16px; }
.ppt-pricing-info h3{ font-size: clamp(24px,2.6vw,30px); color: var(--ink-900); margin-bottom:14px; max-width:480px; }
.ppt-pricing-info p{ font-size:14.5px; color: var(--ink-500); max-width:460px; margin-bottom:28px; }
.ppt-pricing-points{ display:flex; flex-direction:column; gap:16px; }
.ppt-pricing-point{ display:flex; gap:12px; align-items:flex-start; font-size:14px; color: var(--ink-700); }
.ppt-pricing-point .chk{ color: var(--up); flex-shrink:0; }
.ppt-price-card{
  max-width:460px; width:100%; border:1px solid var(--ink-900); border-radius: var(--r-lg); padding:44px 40px;
  background: linear-gradient(180deg, var(--ink-900), var(--accent-900)); color: var(--white); text-align:center; box-shadow: var(--shadow-lg);
}
.ppt-price-badge{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color: var(--gold); background: rgba(232,114,10,0.16); padding:6px 14px; border-radius: var(--r-full); margin-bottom:18px; }
.ppt-price-tagline{ font-size:13px; color: var(--silver-400); margin-bottom:22px; }
.ppt-price-value{ font-family:'Fraunces',serif; font-size:40px; margin-bottom:6px; }
.ppt-price-period{ font-size:12.5px; color: var(--silver-400); margin-bottom:32px; }
.ppt-price-features{ text-align:left; display:flex; flex-direction:column; gap:12px; margin-bottom:32px; }
.ppt-price-feature{ font-size:13.5px; color: var(--silver-100); display:flex; gap:10px; align-items:flex-start; }
.ppt-price-feature .chk{ color:#7FDCA6; flex-shrink:0; }

.ppt-terms-box{ border:1px solid var(--line); border-left:3px solid var(--gold); background: var(--surface-2); padding:28px 32px; border-radius: 0 var(--r-md) var(--r-md) 0; max-width:760px; }
.ppt-terms-box ul{ margin-top:14px; }
.ppt-terms-box li{ font-size:13px; color: var(--ink-600); padding:6px 0 6px 18px; position:relative; }
.ppt-terms-box li::before{ content:"—"; position:absolute; left:0; color: var(--down); }

@media (max-width: 960px){
  .ppt-hero-panel{ padding:36px; }
  .ppt-features-grid{ grid-template-columns: 1fr 1fr; }
  .ppt-process-grid{ grid-template-columns: 1fr 1fr; }
  .ppt-pricing-panel{ grid-template-columns: 1fr; padding:40px 32px; gap:40px; }
  .ppt-pricing-info h3, .ppt-pricing-info p{ max-width:none; }
  .ppt-price-card{ margin:0 auto; }
}
@media (max-width: 620px){
  .ppt-features-grid, .ppt-process-grid{ grid-template-columns: 1fr; }
  .ppt-stats-row{ gap:26px; }
  .ppt-price-card{ padding:34px 26px; }
  .ppt-pricing-panel{ padding:30px 22px; }
}

/* ---------------------------------------------------------------------
   RESPONSIVE
   --------------------------------------------------------------------- */
@media (max-width: 1080px){
  .footer-top{ grid-template-columns: 1fr 1fr 1fr; }
  .values-grid, .team-grid{ grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 960px){
  .nav-links{ display:none; }
  .nav-cta{ display:none; }
  .menu-toggle{ display:flex; }
  .mobile-panel{ display:flex; }
  .mobile-backdrop{ display:block; }
  .hero-content{ grid-template-columns:1fr; }
  .hero{ padding: 76px 0 40px; }
  .chart-card{ max-width:100%; margin-left:0; margin-top:20px; }
  .about-grid, .why-wrap, .cloud-grid, .contact-grid{ grid-template-columns:1fr; }
  .cloud-grid{ padding: 48px 28px; }
  .services-grid, .stats-strip, .steps-grid{ grid-template-columns: 1fr 1fr; }
  .mv-grid{ grid-template-columns:1fr; }
  .why-list{ grid-template-columns:1fr; }
  .section-head{ grid-template-columns:1fr; }
  .footer-top{ grid-template-columns: 1fr 1fr; }
  .hero-stats{ flex-wrap:wrap; gap:26px; }
  .service-detail, .service-detail.reverse{ grid-template-columns:1fr; }
  .service-detail.reverse .sd-visual{ order:1; }
  .service-detail.reverse .sd-copy{ order:2; }
  .newsletter{ flex-direction:column; align-items:flex-start; }
  .newsletter-form{ width:100%; }
  .newsletter-form input{ flex:1; min-width:0; }
  .office-strip{ grid-template-columns:1fr; }
  .field-row{ grid-template-columns:1fr; }
  .pricing-grid, .article-grid{ grid-template-columns: 1fr 1fr; }
}
@media (max-width: 960px){
  .about-photo-banner img{ height:240px; }
}
@media (max-width: 620px){
  .services-grid, .values-grid, .team-grid, .stats-strip, .steps-grid, .pricing-grid, .article-grid{ grid-template-columns: 1fr; }
  .wrap{ padding: 0 20px; }
  .cloud-grid{ padding: 40px 22px; }
